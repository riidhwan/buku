name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  quality-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: browser-actions/setup-chrome@v2

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm test-obligation:check
      - run: pnpm lint:styles
      - run: pnpm test
      - name: Comment coverage below 100%
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('coverage/app/coverage-summary.json') != '' }}
        run: node .github/scripts/comment-coverage.mjs coverage/app/coverage-summary.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm build

  quality-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - uses: android-actions/setup-android@v4

      - run: pnpm install --frozen-lockfile
      - run: pnpm android:sync:debug
      - run: ./gradlew test
        working-directory: android
      - run: ./gradlew lint
        working-directory: android
      - run: ./gradlew assembleDebug
        working-directory: android
