apply plugin: 'com.android.application'

def releaseSigningProperties = new Properties()
def releaseSigningPropertiesFile = rootProject.file('release-signing.properties')
if (releaseSigningPropertiesFile.exists()) {
    releaseSigningPropertiesFile.withInputStream { releaseSigningProperties.load(it) }
}

def signingValue = { name ->
    def projectValue = project.findProperty(name)
    if (projectValue != null) {
        return projectValue.toString()
    }

    def fileValue = releaseSigningProperties.getProperty(name)
    if (fileValue != null) {
        return fileValue
    }

    return System.getenv(name)
}

def releaseKeystoreFile = signingValue('ANDROID_SIGNING_KEYSTORE_FILE')
def releaseKeystorePassword = signingValue('ANDROID_SIGNING_KEYSTORE_PASSWORD')
def releaseKeyAlias = signingValue('ANDROID_SIGNING_KEY_ALIAS')
def releaseKeyPassword = signingValue('ANDROID_SIGNING_KEY_PASSWORD')
def hasReleaseSigning = [
    releaseKeystoreFile,
    releaseKeystorePassword,
    releaseKeyAlias,
    releaseKeyPassword
].every { value -> value != null && !value.trim().isEmpty() }
def releaseBuildRequested = gradle.startParameter.taskNames.any { taskName ->
    def normalizedTaskName = taskName.toLowerCase(java.util.Locale.ROOT)
    normalizedTaskName.endsWith('assemblerelease') || normalizedTaskName.endsWith('bundlerelease')
}

android {
    namespace = "me.ramdhani.buku"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "me.ramdhani.buku"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "0.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseKeystoreFile)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            applicationIdSuffix ".debug"
        }
        release {
            if (!hasReleaseSigning && releaseBuildRequested) {
                throw new GradleException('Release signing is required. Set ANDROID_SIGNING_KEYSTORE_FILE, ANDROID_SIGNING_KEYSTORE_PASSWORD, ANDROID_SIGNING_KEY_ALIAS, and ANDROID_SIGNING_KEY_PASSWORD.')
            }
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
