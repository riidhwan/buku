<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button
        class="library-entry-edit-back"
        aria-label="Back to reader"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="back()"
      >
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ entry()?.displayTitle ?? 'Entry not found' }}</ion-title>
    <ion-buttons slot="end">
      @if (selectedMedia()) {
      <ion-button
        class="library-entry-edit-delete-media"
        aria-label="Delete selected media"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="deleteSelectedMedia()"
      >
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
      } @if (entry()?.hasContentOverride) {
      <ion-button
        class="library-entry-edit-reset"
        aria-label="Reset to original"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="resetToOriginal()"
      >
        <ion-icon slot="icon-only" name="refresh-outline"></ion-icon>
      </ion-button>
      }
      <ion-button
        class="library-entry-edit-cancel"
        aria-label="Cancel edit"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="cancel()"
      >
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
      <ion-button
        class="library-entry-edit-save"
        aria-label="Save edit"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="save()"
      >
        <ion-icon slot="icon-only" name="checkmark-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (entry() !== null) {
  <main class="library-entry-edit">
    @if (validationMessage() !== null) {
    <ion-text class="library-entry-edit-error" color="danger">{{ validationMessage() }}</ion-text>
    }
    <div
      #editorBody
      class="library-entry-edit-body"
      contenteditable="true"
      role="textbox"
      aria-label="Entry content"
      [innerHTML]="draftHtml()"
      (click)="selectMedia($event)"
      (keydown.enter)="selectMedia($event)"
    ></div>
  </main>
  } @else {
  <ion-text class="library-entry-edit-empty">This entry is not in the Library.</ion-text>
  }
</ion-content>
