<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button
        class="library-entry-edit-back"
        aria-label="Back to reader"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="back()"
      >
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ entry()?.displayTitle ?? 'Entry not found' }}</ion-title>
    <ion-buttons slot="end">
      @if (selectedMedia()) {
      <ion-button
        class="library-entry-edit-delete-media"
        aria-label="Delete selected media"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="deleteSelectedMedia()"
      >
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
      } @if (entry()?.hasContentOverride) {
      <ion-button
        class="library-entry-edit-reset"
        aria-label="Reset to original"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="resetToOriginal()"
      >
        <ion-icon slot="icon-only" name="refresh-outline"></ion-icon>
      </ion-button>
      }
      <ion-button
        class="library-entry-edit-cancel"
        aria-label="Cancel edit"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="cancel()"
      >
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
      <ion-button
        class="library-entry-edit-save"
        aria-label="Save edit"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (click)="save()"
      >
        <ion-icon slot="icon-only" name="checkmark-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (entry() !== null) {
  <main class="library-entry-edit">
    @if (validationMessage() !== null) {
    <ion-text class="library-entry-edit-error" color="danger">{{ validationMessage() }}</ion-text>
    }
    <ion-item class="library-entry-edit-title" lines="full">
      <ion-input
        label="Title"
        labelPlacement="stacked"
        aria-label="Entry title"
        [value]="draftTitle()"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (ionInput)="setDraftTitle($event.detail.value)"
      ></ion-input>
    </ion-item>
    <ion-item class="library-entry-edit-header-visibility" lines="full">
      <ion-label>Show header in reader</ion-label>
      <ion-toggle
        slot="end"
        aria-label="Show header in reader"
        [checked]="draftHeaderVisible()"
        [disabled]="saveState() === 'saving' || saveState() === 'resetting'"
        (ionChange)="setDraftHeaderVisible($event.detail.checked)"
      ></ion-toggle>
    </ion-item>
    <div
      #editorBody
      class="library-entry-edit-body"
      [attr.contenteditable]="isFormattingDisabled() ? 'false' : 'true'"
      role="textbox"
      tabindex="0"
      aria-label="Entry content"
      [innerHTML]="draftHtml()"
      (click)="selectMedia($event)"
      (keydown.enter)="selectMedia($event)"
      (input)="refreshEditorInteraction()"
      (keyup)="refreshEditorInteraction()"
      (mouseup)="refreshEditorInteraction()"
      (focus)="refreshEditorInteraction()"
    ></div>
    <div
      class="library-entry-edit-formatting"
      role="toolbar"
      aria-label="Formatting"
      (pointerdown)="preserveEditorInteraction($event)"
    >
      <ion-button
        class="library-entry-edit-format-undo"
        fill="clear"
        size="small"
        aria-label="Undo"
        [disabled]="isFormattingDisabled()"
        (click)="runFormattingCommand('undo')"
      >
        <ion-icon slot="icon-only" name="arrow-undo-outline"></ion-icon>
      </ion-button>
      <ion-button
        class="library-entry-edit-format-redo"
        fill="clear"
        size="small"
        aria-label="Redo"
        [disabled]="isFormattingDisabled()"
        (click)="runFormattingCommand('redo')"
      >
        <ion-icon slot="icon-only" name="arrow-redo-outline"></ion-icon>
      </ion-button>
      <span class="library-entry-edit-formatting-divider" aria-hidden="true"></span>
      <ion-button
        class="library-entry-edit-format-bold"
        fill="clear"
        size="small"
        aria-label="Bold"
        [class.library-entry-edit-format-active]="boldActive()"
        [disabled]="isFormattingDisabled()"
        (click)="runFormattingCommand('bold')"
      >
        <strong aria-hidden="true">B</strong>
      </ion-button>
      <ion-button
        class="library-entry-edit-format-italic"
        fill="clear"
        size="small"
        aria-label="Italic"
        [class.library-entry-edit-format-active]="italicActive()"
        [disabled]="isFormattingDisabled()"
        (click)="runFormattingCommand('italic')"
      >
        <em aria-hidden="true">I</em>
      </ion-button>
      <span class="library-entry-edit-formatting-divider" aria-hidden="true"></span>
      <ion-button
        class="library-entry-edit-format-paragraph"
        fill="clear"
        size="small"
        aria-label="Paragraph"
        [class.library-entry-edit-format-active]="blockFormat() === 'p'"
        [disabled]="isFormattingDisabled()"
        (click)="setBlockFormat('p')"
      >
        <span aria-hidden="true">P</span>
      </ion-button>
      <ion-button
        class="library-entry-edit-format-heading-2"
        fill="clear"
        size="small"
        aria-label="Heading 2"
        [class.library-entry-edit-format-active]="blockFormat() === 'h2'"
        [disabled]="isFormattingDisabled()"
        (click)="setBlockFormat('h2')"
      >
        <span aria-hidden="true">H2</span>
      </ion-button>
      <ion-button
        class="library-entry-edit-format-heading-3"
        fill="clear"
        size="small"
        aria-label="Heading 3"
        [class.library-entry-edit-format-active]="blockFormat() === 'h3'"
        [disabled]="isFormattingDisabled()"
        (click)="setBlockFormat('h3')"
      >
        <span aria-hidden="true">H3</span>
      </ion-button>
    </div>
  </main>
  } @else {
  <ion-text class="library-entry-edit-empty">This entry is not in the Library.</ion-text>
  }
</ion-content>
