<ion-header>
  <ion-toolbar>
    <ion-title>Explore</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form class="url-entry" (submit)="openUrl(); $event.preventDefault()">
    <ion-item>
      <ion-input
        label="Web address"
        label-placement="stacked"
        inputmode="url"
        type="url"
        autocomplete="url"
        placeholder="example.com"
        [value]="browser.inputValue()"
        [errorText]="browser.validationError() ?? ''"
        [class.ion-invalid]="browser.validationError() !== null"
        (ionInput)="updateUrl($event)"
      ></ion-input>
    </ion-item>

    <ion-button type="submit" expand="block">Open</ion-button>
  </form>

  @if (browser.recentTabs().length > 0) {
  <ion-list inset="true" class="recent-tabs">
    @for (tab of browser.recentTabs(); track tab.id) {
    <ion-item button="true" detail="true" (click)="resumeTab(tab.id)">
      <ion-label>
        <h2>{{ tabLabel(tab.url) }}</h2>
        <p>{{ tab.url }}</p>
      </ion-label>
    </ion-item>
    }
  </ion-list>
  } @else {
  <ion-note class="empty-state">No recent Explore Browser tabs.</ion-note>
  }
</ion-content>
